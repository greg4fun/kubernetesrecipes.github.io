<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#326CE5"/>
      <stop offset="100%" stop-color="#1E4DB7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Kubernetes helm wheel (simplified) -->
  <g transform="translate(256,240)" fill="none" stroke="#fff" stroke-width="12">
    <!-- Inner circle -->
    <circle r="52" fill="#fff" fill-opacity="0.15" stroke="#fff" stroke-width="10"/>
    <!-- Center heptagon dot -->
    <circle r="16" fill="#fff" stroke="none"/>
    <!-- Spokes -->
    <line x1="0" y1="-52" x2="0" y2="-90" stroke-linecap="round"/>
    <line x1="49" y1="-16" x2="85" y2="-28" stroke-linecap="round"/>
    <line x1="30" y1="42" x2="53" y2="73" stroke-linecap="round"/>
    <line x1="-30" y1="42" x2="-53" y2="73" stroke-linecap="round"/>
    <line x1="-49" y1="-16" x2="-85" y2="-28" stroke-linecap="round"/>
    <!-- Spoke end circles -->
    <circle cx="0" cy="-96" r="10" fill="#fff" stroke="none"/>
    <circle cx="91" cy="-30" r="10" fill="#fff" stroke="none"/>
    <circle cx="56" cy="78" r="10" fill="#fff" stroke="none"/>
    <circle cx="-56" cy="78" r="10" fill="#fff" stroke="none"/>
    <circle cx="-91" cy="-30" r="10" fill="#fff" stroke="none"/>
  </g>
  <!-- Recipe book icon at bottom -->
  <g transform="translate(256,410)" fill="#fff">
    <rect x="-60" y="-20" width="120" height="8" rx="4" opacity="0.7"/>
    <rect x="-45" y="-6" width="90" height="8" rx="4" opacity="0.5"/>
    <rect x="-50" y="8" width="100" height="8" rx="4" opacity="0.3"/>
  </g>
</svg>
