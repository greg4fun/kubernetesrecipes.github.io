name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          # path: . # The root location of your Astro project inside the repository. (optional)
          # node-version: 20 # The specific version of Node that should be used to build your site. Defaults to 20. (optional)
          # package-manager: pnpm@latest # The Node package manager that should be used to install dependencies and build your site. Automatically detected based on your lockfile. (optional)
          package-manager: npm
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed content files
        id: changed
        run: |
          # Get list of changed/added .md recipe files
          CHANGED=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- 'src/content/recipes/*.md' | \
            sed 's|src/content/recipes/||;s|\.md$||' | head -100)
          
          if [ -z "$CHANGED" ]; then
            echo "No recipe changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed recipes:"
            echo "$CHANGED"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            
            # Build URL list
            URLS=""
            while IFS= read -r slug; do
              # Determine category from frontmatter
              FILE="src/content/recipes/${slug}.md"
              if [ -f "$FILE" ]; then
                CAT=$(grep '^category:' "$FILE" | head -1 | sed 's/category: *"*//;s/"*$//')
                if [ -n "$CAT" ]; then
                  URLS="${URLS}\"https://kubernetes.recipes/recipes/${CAT}/${slug}/\","
                fi
              fi
            done <<< "$CHANGED"
            
            # Also submit changed non-recipe pages
            OTHER=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- 'src/pages/*.astro' | \
              sed 's|src/pages/||;s|\.astro$||;s|index||' | head -20)
            while IFS= read -r page; do
              [ -n "$page" ] && URLS="${URLS}\"https://kubernetes.recipes/${page}\","
            done <<< "$OTHER"
            
            # Always include sitemap
            URLS="${URLS}\"https://kubernetes.recipes/sitemap-index.xml\""
            
            echo "url_list=[${URLS}]" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit to IndexNow
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          echo "Submitting URLs to IndexNow..."
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "kubernetes.recipes",
              "key": "ace3fe0ef1224e0d911493565fe9df63",
              "keyLocation": "https://kubernetes.recipes/ace3fe0ef1224e0d911493565fe9df63.txt",
              "urlList": ${{ steps.changed.outputs.url_list }}
            }' -w "\nHTTP Status: %{http_code}\n"
          echo "IndexNow submission complete"
